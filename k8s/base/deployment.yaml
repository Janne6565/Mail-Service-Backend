apiVersion: apps/v1
kind: Deployment
metadata:
  name: mail-service
  labels:
    app.kubernetes.io/name: mail-service
    app.kubernetes.io/instance: mail-service
spec:
  replicas: 1
  revisionHistoryLimit: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: mail-service
      app.kubernetes.io/instance: mail-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mail-service
        app.kubernetes.io/instance: mail-service
    spec:
      serviceAccountName: default
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: app
          image: ghcr.io/janne6565/mail-service-backend:main-203687c
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
            - name: management
              containerPort: 8081
          env:
            - name: SERVER_SHUTDOWN
              value: graceful
            - name: ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mail-service-secrets
                  key: admin_username
            - name: ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: mail-service-secrets
                  key: admin_email
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mail-service-secrets
                  key: admin_password
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: mail-service-secrets
                  key: jwt_secret_key
            - name: CIPHER_KEY
              valueFrom:
                secretKeyRef:
                  name: mail-service-secrets
                  key: cipher_key
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-secrets
                  key: db_url
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: postgres-secrets
                  key: db_username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secrets
                  key: db_password

          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: management
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 6
            timeoutSeconds: 1
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: management
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 1
          startupProbe:
            httpGet:
              path: /actuator/health
              port: management
            periodSeconds: 5
            failureThreshold: 30

          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1024Mi"

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]

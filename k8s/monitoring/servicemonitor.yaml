apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: mail-service
  namespace: default
  labels:
    release: prometheus
spec:
  namespaceSelector:
    matchNames:
      - mailservice
  selector:
    matchLabels:
      app.kubernetes.io/name: mail-service
  endpoints:
    - port: management
      path: /actuator/prometheus
      interval: 30s
      scrapeTimeout: 10s

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mail-service-monitoring
  namespace: argocd
spec:
  project: mail-service
  source:
    repoURL: https://github.com/janne6565/Mail-Service-Backend.git
    targetRevision: main
    path: k8s/monitoring
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

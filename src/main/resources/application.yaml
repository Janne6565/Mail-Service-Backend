spring:
  application:
    name: mailService
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/mailservice}
    username: ${DB_USERNAME:mailservice}
    password: ${DB_PASSWORD:mailservice}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    # Existing prod DBs were created by Hibernate (Flyway was off); baseline them at V3 so only
    # V4 onward runs. Fresh DBs have no schema history table, so Flyway baselines then runs V1..V4.
    baseline-on-migrate: true
    baseline-version: 3
jwt:
  # base64-encoded signing key — CHANGE THIS IN PRODUCTION
  secret-key: ${JWT_SECRET_KEY:bWFpbHNlcnZpY2Utc2VjcmV0LWtleS1mb3ItZGV2LW9ubHktZG8tbm90LXVzZS1pbi1wcm9k}
  identity-token-expiration-time: 3600000      # 1 hour
  refresh-token-expiration-time: 2592000000    # 30 days

mailservice:
  oauth:
    providers:
      authentik:
        client-id: ${MAILSERVICE_OAUTH_CLIENT_ID:}
        client-secret: ${MAILSERVICE_OAUTH_CLIENT_SECRET:}
        authorization-uri: https://sso.jannekeipert.de/application/o/authorize/
        token-uri: https://sso.jannekeipert.de/application/o/token/
        user-info-uri: https://sso.jannekeipert.de/application/o/userinfo/
        scope: openid email profile
        callback-uri: ${MAILSERVICE_OAUTH_CALLBACK_URI:http://localhost:8080/api/v1/auth/oauth/authentik/callback}
    groups:
      admin: mail-service-admins
      user: mail-service-users
  frontend:
    url: ${MAILSERVICE_FRONTEND_URL:http://localhost:5173}

app:
  admin:
    username: ${ADMIN_USERNAME:admin}
    email: ${ADMIN_EMAIL:admin@localhost}
    password: ${ADMIN_PASSWORD:changeme}
  # base64-encoded 32-byte AES-256 key — CHANGE THIS IN PRODUCTION
  cipher-key: ${CIPHER_KEY:bWFpbFNlcnZpY2VDaXBoZXJLZXkwMTIzNDU2Nzg=}
  mail:
    default-retention-days: ${DEFAULT_MAIL_RETENTION_DAYS:30}

management:
  endpoint:
    prometheus:
      enabled: true
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    tags:
      application: ${METRICS_APPLICATION_TAG:mail-service-backend}
    distribution:
      percentiles-histogram:
        http.server.requests: true
  server:
    port: 8081

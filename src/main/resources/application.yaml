spring:
  application:
    name: mailService
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/mailservice}
    username: ${DB_USERNAME:mailservice}
    password: ${DB_PASSWORD:mailservice}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: false
jwt:
  # base64-encoded signing key — CHANGE THIS IN PRODUCTION
  secret-key: ${JWT_SECRET_KEY:bWFpbHNlcnZpY2Utc2VjcmV0LWtleS1mb3ItZGV2LW9ubHktZG8tbm90LXVzZS1pbi1wcm9k}
  identity-token-expiration-time: 3600000      # 1 hour
  refresh-token-expiration-time: 2592000000    # 30 days

app:
  admin:
    username: ${ADMIN_USERNAME:admin}
    email: ${ADMIN_EMAIL:admin@localhost}
    password: ${ADMIN_PASSWORD:changeme}
  # base64-encoded 32-byte AES-256 key — CHANGE THIS IN PRODUCTION
  cipher-key: ${CIPHER_KEY:bWFpbFNlcnZpY2VDaXBoZXJLZXkwMTIzNDU2Nzg=}
  mail:
    default-retention-days: ${DEFAULT_MAIL_RETENTION_DAYS:30}

management:
  server:
    port: 8081
  endpoints:
    web:
      exposure:
        include: health,readiness,liveness,prometheus
      base-path: /actuator
  endpoint:
    health:
      probes:
        enabled: true
